name: Deploy Repo Watch (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-repo-watch-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Deploy API and web
        env:
          PM2_HOME: /var/www/.pm2
        run: scripts/deploy-production.sh
